services:
  - type: web
    name: dhara-portfolio
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: MAIL_USERNAME
        value: dhararuparel16@gmail.com
      - key: MAIL_PASSWORD
        sync: false
      - key: CONTACT_RECEIVER_EMAIL
        value: dhararuparel16@gmail.com

databases:
  - name: portfolio-db
    databaseName: portfolio_db
    user: portfolio_user
